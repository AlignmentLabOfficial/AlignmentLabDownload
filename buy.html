<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alignment Lab — Checkout</title>
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #0d0d0d;
      color: #ffffff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    h1 { font-weight: 600; font-size: 20px; margin: 0 0 8px; }
    p  { color: #b9b9b9; margin: 0 0 24px; font-size: 15px; }
    button {
      background: transparent;
      color: #e3ff00;
      border: 1px solid #e3ff00;
      border-radius: 999px;
      padding: 12px 28px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #e3ff00; color: #0d0d0d; }
    .opts a { display: block; color: #e3ff00; margin: 8px 0; text-decoration: none; }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #8a8a8a;
      border-top: 1px solid #222;
    }
    footer a { color: #b9b9b9; text-decoration: none; margin: 0 10px; }
    footer a:hover { color: #e3ff00; }
  </style>
</head>
<body>
  <div class="main">
    <div>
      <h1 id="title">Opening checkout…</h1>
      <p id="sub">If it doesn't appear automatically, tap below.</p>
      <button id="cta" onclick="openCheckout()">Continue to checkout</button>
      <div class="opts" id="opts" style="display:none;">
        <a href="?tier=single">Single Machine — $200</a>
        <a href="?tier=dual">Dual Machine — $380</a>
        <a href="?tier=team">Team (5 machines) — $900</a>
      </div>
    </div>
  </div>

  <footer>
    Alignment Lab &nbsp;·&nbsp;
    <a href="https://alignmentlab.app/#TOS" target="_blank">Terms of Service</a>
    <a href="https://alignmentlab.app/#privacypolicy" target="_blank">Privacy Policy</a>
    <a href="https://alignmentlab.app/#refundpolicy" target="_blank">Refund Policy</a>
  </footer>

  <script>
    Paddle.Initialize({ token: "live_cef8cf05b7b6517dd6290fc6525" });

    var prices = {
      single: "pri_01kv7tn15r3ef7q3azmfzvwppv",
      dual:   "pri_01kv7tqtt0tqk3r5pdcrqvtb2n",
      team:   "pri_01kv7tw7vyfngdfgbqesbgngm5"
    };

    var tier = new URLSearchParams(location.search).get("tier");

    function openCheckout() {
      if (prices[tier]) {
        Paddle.Checkout.open({ items: [{ priceId: prices[tier], quantity: 1 }] });
      }
    }

    if (prices[tier]) {
      openCheckout();
    } else {
      document.getElementById("title").textContent = "Choose your licence";
      document.getElementById("sub").textContent = "Select the licence you'd like to buy.";
      document.getElementById("cta").style.display = "none";
      document.getElementById("opts").style.display = "block";
    }
  </script>
</body>
</html>
